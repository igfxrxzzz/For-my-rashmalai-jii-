<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surprise for Rasmalai 🎂</title>
    <style>
        body { margin: 0; padding: 0; background: #fff0f3; font-family: 'Arial Rounded MT Bold', sans-serif; overflow: hidden; text-align: center; touch-action: manipulation; }
        #game-container { position: relative; width: 100vw; height: 100vh; }
        
        /* Music Button */
        #music-btn { position: fixed; top: 20px; right: 20px; z-index: 1000; background: white; border: 2px solid #ffb7c5; border-radius: 50%; width: 45px; height: 45px; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }

        /* Countdown Style */
        #countdown-screen { display: none; font-size: 80px; color: #ff4d6d; font-weight: bold; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 500; }

        .section { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 100%; z-index: 100; }
        .pass-input { padding: 12px; border-radius: 10px; border: 2px solid #ffb7c5; margin-bottom: 10px; width: 65%; font-size: 1.1rem; outline: none; }

        .envelope { width: 280px; height: 160px; background: #ffb7c5; border-radius: 0 0 10px 10px; position: relative; margin: auto; }
        .envelope::before { content: ""; position: absolute; top: -80px; left: 0; border-left: 140px solid transparent; border-right: 140px solid transparent; border-bottom: 80px solid #ffccd5; }
        .letter { position: absolute; bottom: 5px; left: 10px; right: 10px; background: white; padding: 15px; border-radius: 5px; transition: 1s ease-in-out; font-size: 0.85rem; text-align: left; line-height: 1.4; color: #444; min-height: 100px; }
        .open-letter { transform: translateY(-150px); z-index: 5 !important; }

        .btn-pookie { background: #ffb7c5; color: white; border: none; padding: 12px 25px; border-radius: 30px; cursor: pointer; margin-top: 15px; font-weight: bold; }
        #no-btn { position: absolute; background: #adb5bd; color: white; border: none; padding: 10px 20px; border-radius: 30px; }
    </style>
</head>
<body>
    <button id="music-btn" onclick="toggleMusic()">🎵</button>
    <audio id="love-music" loop><source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3" type="audio/mpeg"></audio>
    
    <div id="countdown-screen"></div>

    <div id="game-container">
        <div id="start-screen" style="display: block; margin-top: 50%;">
            <h1 style="color: #ff8fa3;">Aapke Liye Surprise! 🎀</h1>
            <button class="btn-pookie" onclick="startGame()">Shuru Karein Aap 🐾</button>
        </div>

        <div id="pass-section" class="section">
            <h2 style="color: #ff8fa3;">Secret Code Daaliye Aap 🔐</h2>
            <input type="text" id="pass-input" class="pass-input" placeholder="Hint: MeriRashmalai">
            <br>
            <button class="btn-pookie" onclick="handlePassword()">Unlock ✨</button>
        </div>

        <div id="letter-wrapper" class="section">
            <div class="envelope">
                <div class="letter" id="letter">
                    <div id="typewriter"></div>
                    <button id="next-final" class="btn-pookie" style="display:none; width:100%; font-size: 10px;" onclick="showFinalTrap()">Aage Badhiye 🐾</button>
                </div>
            </div>
        </div>

        <div id="love-trap" class="section">
            <h1 style="color: #ff7675;">Kya aap hamesha saath rahengi? ❤️</h1>
            <button class="btn-pookie" style="padding: 15px 40px;" onclick="celebrate()">HAAN</button>
            <button id="no-btn" onmouseover="moveNo()">NAHI</button>
        </div>

        <div id="final-success" class="section">
            <h1 style="color:#ff4d6d;">Happy Birthday, Rasmalai! ❤️✨</h1>
        </div>
    </div>

    <script>
        let music = document.getElementById('love-music');
        let isPlaying = false;

        function toggleMusic() {
            if (isPlaying) { music.pause(); } else { music.play(); }
            isPlaying = !isPlaying;
        }

        function startGame() {
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('pass-section').style.display = 'block';
            if(!isPlaying) toggleMusic();
        }

        function handlePassword() {
            if(document.getElementById('pass-input').value.toLowerCase() === 'merirashmalai') {
                document.getElementById('pass-section').style.display = 'none';
                startCountdown();
            } else { alert("Wrong Code! 😜"); }
        }

        function startCountdown() {
            const cd = document.getElementById('countdown-screen');
            cd.style.display = 'block';
            let count = 3;
            cd.innerHTML = count;
            
            let timer = setInterval(() => {
                count--;
                if(count > 0) {
                    cd.innerHTML = count;
                } else {
                    clearInterval(timer);
                    cd.style.display = 'none';
                    document.getElementById('letter-wrapper').style.display = 'block';
                    startTypewriter();
                }
            }, 1000);
        }

        function startTypewriter() {
            document.getElementById('letter').classList.add('open-letter');
            const text = "Happy Birthday, Rasmalai Aap! 🎈\n\nAaj aapka din hai, toh khoob enjoy kijiye. Aap jaisi hain, bilkul perfect hain. ❤️";
            let i = 0;
            function type() {
                if (i < text.length) {
                    document.getElementById('typewriter').innerHTML += text.charAt(i);
                    i++; setTimeout(type, 50);
                } else { document.getElementById('next-final').style.display = 'block'; }
            }
            setTimeout(type, 1000);
        }

        function showFinalTrap() { document.getElementById('letter-wrapper').style.display = 'none'; document.getElementById('love-trap').style.display = 'block'; }
        function moveNo() { 
            const btn = document.getElementById('no-btn');
            btn.style.left = Math.random() * 70 + 'vw';
            btn.style.top = Math.random() * 70 + 'vh';
        }
        function celebrate() { document.getElementById('love-trap').style.display = 'none'; document.getElementById('final-success').style.display = 'block'; }
    </script>
</body>
                </html>
